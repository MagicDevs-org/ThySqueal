# ThySqueal Server Configuration
# Example config file

version: "1.0"

server:
  host: "127.0.0.1"
  http:
    port: 8888
    tls_enabled: false
  mysql:
    port: 13306
    version: "8.0.0"
  redis:
    port: 16379

storage:
  data_dir: "./data"
  max_memory_mb: 1024
  default_cache_size: 1000
  default_eviction: "LRU"
  snapshot_interval_sec: 300
  wal_enabled: true

security:
  auth_enabled: false
  tls_enabled: false
  default_user: "root"
  default_password: ""

logging:
  level: "info"
  format: "json"
