# ThySqueal Server Configuration
# Example config file

server:
  host: "127.0.0.1"
  http:
    enabled: true
    port: 8888
    # Unix socket path (optional)
    # path: "/tmp/thysqueal/http.sock"
  mysql:
    enabled: true
    port: 13306
    version: "8.0.0"
    # Unix socket path (optional)
    # path: "/tmp/thysqueal/mysql.sock"
  redis:
    enabled: true
    port: 16379
    # Unix socket path (optional)
    # path: "/tmp/thysqueal/redis.sock"

storage:
  data_dir: "./data"
  max_memory_mb: 1024
  wal_enabled: true

security:
  auth_enabled: false
  default_user: "root"

logging:
  level: "info"
